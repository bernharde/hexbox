name: publish-nuget

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish from (for example v2.0.123).
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: windows-latest
    environment: nuget

    steps:
      - name: Download package from release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts/nuget
          gh release download "${{ inputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.nupkg" \
            --dir artifacts/nuget

          if ! ls artifacts/nuget/*.nupkg >/dev/null 2>&1; then
            echo "No .nupkg asset found on release tag ${{ inputs.tag }}." >&2
            exit 1
          fi

      - name: Publish packages to NuGet
        if: ${{ secrets.NUGET_API_KEY != '' }}
        run: dotnet nuget push "artifacts/nuget/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Fail when NuGet key is missing
        if: ${{ secrets.NUGET_API_KEY == '' }}
        shell: pwsh
        run: throw 'NUGET_API_KEY is not configured for environment nuget.'
