name: store

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Optional build workflow run ID. Leave empty to use latest successful run.
        required: false
        type: string
      artifact_name:
        description: Artifact name containing the Store candidate build output.
        required: false
        default: store-candidate
        type: string

permissions:
  actions: read
  contents: read

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Resolve build run ID
        id: resolve_run
        uses: actions/github-script@v7
        with:
          script: |
            const provided = `${{ inputs.run_id }}`.trim();
            if (provided) {
              core.info(`Using provided run_id: ${provided}`);
              core.setOutput('run_id', provided);
              return;
            }

            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build.yml',
              status: 'completed',
              per_page: 50
            });

            const latestSuccessful = runs.find((r) => r.conclusion === 'success');
            if (!latestSuccessful) {
              core.setFailed('No successful build workflow runs found.');
              return;
            }

            core.info(`Auto-selected run_id: ${latestSuccessful.id}`);
            core.setOutput('run_id', String(latestSuccessful.id));

      - name: Download Store candidate artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: artifacts/store
          run-id: ${{ steps.resolve_run.outputs.run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}

      - name: Validate downloaded Store artifact
        shell: bash
        run: |
          if ! find artifacts/store -type f | grep -q .; then
            echo "No files found in store artifact '${{ inputs.artifact_name }}' from run '${{ steps.resolve_run.outputs.run_id }}'." >&2
            exit 1
          fi

      - name: Upload Store artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-store-artifacts
          path: artifacts/store/**
