name: build

on:
  push:
    branches:
      - main
      - master
      - feature/**
    tags:
      - 'v*'
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      product_version: ${{ steps.resolve.outputs.product_version }}
      release_tag: ${{ steps.resolve.outputs.release_tag }}
    steps:
      - name: Resolve release version
        id: resolve
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" && "${GITHUB_REF_NAME}" =~ ^v ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="2.0.${GITHUB_RUN_NUMBER}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version '$VERSION'. Expected format: X.Y.Z (numeric)." >&2
            exit 1
          fi

          echo "product_version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "### Version: $VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "Resolved version: $VERSION"

  build:
    runs-on: windows-latest
    needs: version
    env:
      PRODUCT_VERSION: ${{ needs.version.outputs.product_version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore src/hexbox.sln

      - name: Build
        run: dotnet build src/hexbox.sln --configuration Release --no-restore /p:ContinuousIntegrationBuild=true /p:Version=${{ env.PRODUCT_VERSION }} /p:AssemblyVersion=${{ env.PRODUCT_VERSION }}.0 /p:FileVersion=${{ env.PRODUCT_VERSION }}.0 /p:InformationalVersion=${{ env.PRODUCT_VERSION }}

      - name: Pack Be.Windows.Forms.HexBox
        run: dotnet pack src/Be.Windows.Forms.HexBox/Be.Windows.Forms.HexBox.csproj --configuration Release --no-build --output artifacts/nuget /p:ContinuousIntegrationBuild=true /p:PackageVersion=${{ env.PRODUCT_VERSION }}

      - name: Publish Be.HexEditor small self-contained artifact
        run: dotnet publish src/Be.HexEditor/Be.HexEditor.csproj -p:PublishProfile=SmallSelfContained -p:Version=${{ env.PRODUCT_VERSION }} -p:AssemblyVersion=${{ env.PRODUCT_VERSION }}.0 -p:FileVersion=${{ env.PRODUCT_VERSION }}.0 -p:InformationalVersion=${{ env.PRODUCT_VERSION }} --output artifacts/publish/Be.HexEditor/SmallSelfContained

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget/*

      - name: Upload Be.HexEditor artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-candidate
          path: artifacts/publish/Be.HexEditor/SmallSelfContained/**

  tag-release:
    runs-on: ubuntu-latest
    needs:
      - version
      - build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    env:
      PRODUCT_VERSION: ${{ needs.version.outputs.product_version }}
      RELEASE_TAG: ${{ needs.version.outputs.release_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$RELEASE_TAG"
          git push origin "$RELEASE_TAG"

      - name: Download NuGet artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: release-assets/nuget

      - name: Download Be.HexEditor artifact
        uses: actions/download-artifact@v4
        with:
          name: installer-candidate
          path: release-assets/Be.HexEditor

      - name: Zip Be.HexEditor binaries
        run: zip -r release-assets/Be.HexEditor-v${{ env.PRODUCT_VERSION }}.zip release-assets/Be.HexEditor/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: Release v${{ env.PRODUCT_VERSION }}
          generate_release_notes: true
          files: |
            release-assets/nuget/*.nupkg
            release-assets/nuget/*.snupkg
            release-assets/Be.HexEditor-v${{ env.PRODUCT_VERSION }}.zip

