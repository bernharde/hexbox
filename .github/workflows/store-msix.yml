name: store-msix

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  PRODUCT_VERSION: 2.0.${{ github.run_number }}

jobs:
  publish:
    runs-on: windows-latest
    environment: production
    env:
      RESOLVED_ARTIFACT_SIGNING_CERTIFICATE_PROFILE: ${{ vars.ARTIFACT_SIGNING_CERTIFICATE_PROFILE != 'REPLACE_ME' && vars.ARTIFACT_SIGNING_CERTIFICATE_PROFILE || secrets.ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86
            runtime: win-x86
            arch: x86
          - platform: x64
            runtime: win-x64
            arch: x64
          - platform: arm64
            runtime: win-arm64
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore app project
        run: dotnet restore src/Be.HexEditor/Be.HexEditor.csproj --runtime ${{ matrix.runtime }}

      - name: Validate signing configuration
        shell: pwsh
        env:
          ARTIFACT_SIGNING_ENDPOINT: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          ARTIFACT_SIGNING_CERTIFICATE_PROFILE: ${{ env.RESOLVED_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:ARTIFACT_SIGNING_ENDPOINT)) {
            throw 'Environment variable ARTIFACT_SIGNING_ENDPOINT is required.'
          }

          if ([string]::IsNullOrWhiteSpace($env:ARTIFACT_SIGNING_CERTIFICATE_PROFILE)) {
            throw 'Set ARTIFACT_SIGNING_CERTIFICATE_PROFILE as a repository/environment variable, or set the ARTIFACT_SIGNING_CERTIFICATE_PROFILE secret.'
          }

          if ($env:ARTIFACT_SIGNING_CERTIFICATE_PROFILE -eq 'REPLACE_ME') {
            throw 'Environment variable ARTIFACT_SIGNING_CERTIFICATE_PROFILE must be replaced with a real certificate profile name.'
          }

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Publish app
        shell: pwsh
        run: |
          $PublishDir = Join-Path $env:GITHUB_WORKSPACE "artifacts\publish\${{ matrix.platform }}"
          dotnet publish src/Be.HexEditor/Be.HexEditor.csproj --configuration Release --runtime ${{ matrix.runtime }} --self-contained true /p:PublishSingleFile=true /p:EnableCompressionInSingleFile=true /p:PublishTrimmed=false /p:DebugType=none /p:DebugSymbols=false --output $PublishDir

      - name: Create MSIX package
        shell: pwsh
        run: |
          $WorkspaceDir    = $env:GITHUB_WORKSPACE
          $PublishDir      = Join-Path $WorkspaceDir "artifacts\publish\${{ matrix.platform }}"
          $StagingDir      = Join-Path $WorkspaceDir "artifacts\msix-staging\${{ matrix.platform }}"
          $OutputDir       = Join-Path $WorkspaceDir "artifacts\msix\${{ matrix.platform }}"
          $AssetsDir       = Join-Path $StagingDir "Assets"

          New-Item -ItemType Directory -Force -Path $StagingDir | Out-Null
          New-Item -ItemType Directory -Force -Path $OutputDir  | Out-Null
          New-Item -ItemType Directory -Force -Path $AssetsDir  | Out-Null

          # Copy published app files into staging root
          Copy-Item "$PublishDir\*" -Destination $StagingDir -Recurse -Force

          # Use assets from source tree if present, otherwise generate placeholders
          $SourceAssets = Join-Path $WorkspaceDir "src\Be.HexEditor\Package\Assets"
          if (Test-Path $SourceAssets) {
            Copy-Item "$SourceAssets\*" -Destination $AssetsDir -Recurse -Force
          } else {
            # Generate minimal 1x1 transparent PNG placeholders so MakeAppx succeeds.
            # Replace these with real artwork before submitting to the Store.
            Add-Type -AssemblyName System.Drawing
            $sizes = @{
              "Square44x44Logo.png"     = [System.Drawing.Size]::new(44, 44)
              "Square150x150Logo.png"   = [System.Drawing.Size]::new(150, 150)
              "Wide310x150Logo.png"     = [System.Drawing.Size]::new(310, 150)
              "Square71x71Logo.png"     = [System.Drawing.Size]::new(71, 71)
              "Square310x310Logo.png"   = [System.Drawing.Size]::new(310, 310)
              "StoreLogo.png"           = [System.Drawing.Size]::new(50, 50)
              "SplashScreen.png"        = [System.Drawing.Size]::new(620, 300)
            }
            foreach ($entry in $sizes.GetEnumerator()) {
              $bmp = New-Object System.Drawing.Bitmap($entry.Value.Width, $entry.Value.Height)
              $bmp.Save((Join-Path $AssetsDir $entry.Key), [System.Drawing.Imaging.ImageFormat]::Png)
              $bmp.Dispose()
            }
          }

          # Copy AppxManifest.xml from source tree and substitute build-time tokens
          $manifestSrc = Join-Path $WorkspaceDir "src\Be.HexEditor\Package\AppxManifest.xml"
          $manifestContent = Get-Content $manifestSrc -Raw -Encoding UTF8
          $manifestContent = $manifestContent -replace '\{\{VERSION\}\}', "${{ env.PRODUCT_VERSION }}.0"
          $manifestContent = $manifestContent -replace '\{\{ARCH\}\}',    "${{ matrix.arch }}"
          Set-Content -Path (Join-Path $StagingDir "AppxManifest.xml") -Value $manifestContent -Encoding UTF8

          # Locate the latest MakeAppx.exe from the Windows SDK
          $makeAppx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Filter "makeappx.exe" -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.Directory.Name -eq "x64" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (-not $makeAppx) {
            throw "makeappx.exe not found. Ensure the Windows SDK is installed on the runner."
          }
          Write-Host "Using MakeAppx: $($makeAppx.FullName)"

          $OutputFile = Join-Path $OutputDir "Be.HexEditor-${{ matrix.platform }}.msix"
          & $makeAppx.FullName pack /d $StagingDir /p $OutputFile
          if ($LASTEXITCODE -ne 0) {
            throw "MakeAppx failed with exit code $LASTEXITCODE"
          }

      - name: Sign published executable
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: hexboxsigning3573
          certificate-profile-name: ${{ env.RESOLVED_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
          files: ${{ github.workspace }}\artifacts\publish\${{ matrix.platform }}\Be.HexEditor.exe
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Be.HexEditor
          description-url: https://github.com/bernharde/hexbox
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Create MSIXS candidate
        shell: pwsh
        run: |
          $WorkspaceDir = $env:GITHUB_WORKSPACE
          $MsixDir = Join-Path $WorkspaceDir "artifacts\msix\${{ matrix.platform }}"
          $MsixsDir = Join-Path $WorkspaceDir "artifacts\msixs\${{ matrix.platform }}"
          New-Item -ItemType Directory -Force -Path $MsixsDir | Out-Null

          $sourceMsix = Get-ChildItem -Path $MsixDir -Filter *.msix -File -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $sourceMsix) {
            throw 'No MSIX package found to create MSIXS candidate.'
          }

          $candidateMsix = Join-Path $MsixsDir ($sourceMsix.BaseName + '.msix')
          Copy-Item -Path $sourceMsix.FullName -Destination $candidateMsix -Force

      - name: Sign MSIXS candidate
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ vars.ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: hexboxsigning3573
          certificate-profile-name: ${{ env.RESOLVED_ARTIFACT_SIGNING_CERTIFICATE_PROFILE }}
          files: ${{ github.workspace }}\artifacts\msixs\${{ matrix.platform }}\Be.HexEditor-${{ matrix.platform }}.msix
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
          description: Be.HexEditor MSIXS
          description-url: https://github.com/bernharde/hexbox
          exclude-environment-credential: true
          exclude-workload-identity-credential: true
          exclude-managed-identity-credential: true
          exclude-shared-token-cache-credential: true
          exclude-visual-studio-credential: true
          exclude-visual-studio-code-credential: true
          exclude-azure-cli-credential: false
          exclude-azure-powershell-credential: true
          exclude-azure-developer-cli-credential: true
          exclude-interactive-browser-credential: true

      - name: Rename signed package to MSIXS
        shell: pwsh
        run: |
          $MsixsDir = Join-Path $env:GITHUB_WORKSPACE "artifacts\msixs\${{ matrix.platform }}"
          $signedMsix = Get-ChildItem -Path $MsixsDir -Filter *.msix -File -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $signedMsix) {
            throw 'No signed MSIX candidate found to rename as .msixs.'
          }

          $target = Join-Path $MsixsDir ($signedMsix.BaseName + '.msixs')
          if (Test-Path $target) {
            Remove-Item -Path $target -Force
          }

          Move-Item -Path $signedMsix.FullName -Destination $target

      - name: Validate MSIX output
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\artifacts\msix\${{ matrix.platform }}" -Filter *.msix -File -ErrorAction SilentlyContinue
          if (-not $files) {
            throw 'No MSIX package was produced.'
          }
          Write-Host "MSIX produced: $($files | Select-Object -ExpandProperty Name)"

          $signedPackages = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\artifacts\msixs\${{ matrix.platform }}" -Filter *.msixs -File -ErrorAction SilentlyContinue
          if (-not $signedPackages) {
            throw 'No MSIXS package was produced.'
          }
          Write-Host "MSIXS produced: $($signedPackages | Select-Object -ExpandProperty Name)"

          $signedExe = Get-Item -Path "$env:GITHUB_WORKSPACE\artifacts\publish\${{ matrix.platform }}\Be.HexEditor.exe" -ErrorAction SilentlyContinue
          if (-not $signedExe) {
            throw 'No signed Be.HexEditor.exe was found.'
          }
          Write-Host "Signed executable produced: $($signedExe.Name)"

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-store-msix-${{ matrix.platform }}
          path: artifacts/msix/${{ matrix.platform }}/*.msix

      - name: Upload MSIXS artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-signed-msix-${{ matrix.platform }}
          path: artifacts/msixs/${{ matrix.platform }}/*.msixs

      - name: Upload signed executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-signed-exe-${{ matrix.platform }}
          path: artifacts/publish/${{ matrix.platform }}/Be.HexEditor.exe

  bundle:
    runs-on: windows-latest
    needs: publish
    environment: production

    steps:
      - name: Download x86 MSIX
        uses: actions/download-artifact@v4
        with:
          name: windows-store-msix-x86
          path: bundle-assets/x86

      - name: Download x64 MSIX
        uses: actions/download-artifact@v4
        with:
          name: windows-store-msix-x64
          path: bundle-assets/x64

      - name: Download arm64 MSIX
        uses: actions/download-artifact@v4
        with:
          name: windows-store-msix-arm64
          path: bundle-assets/arm64

      - name: Create MSIX bundle
        shell: pwsh
        run: |
          $WorkspaceDir = $env:GITHUB_WORKSPACE
          $InputDir = Join-Path $WorkspaceDir "bundle-assets"
          $OutputDir = Join-Path $WorkspaceDir "artifacts\bundle"
          New-Item -ItemType Directory -Force -Path $OutputDir | Out-Null

          $makeAppx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Filter "makeappx.exe" -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.Directory.Name -eq "x64" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (-not $makeAppx) {
            throw "makeappx.exe not found. Ensure the Windows SDK is installed on the runner."
          }
          Write-Host "Using MakeAppx: $($makeAppx.FullName)"

          $bundleFile = Join-Path $OutputDir "Be.HexEditor-$env:PRODUCT_VERSION.msixbundle"
          & $makeAppx.FullName bundle /d $InputDir /p $bundleFile
          if ($LASTEXITCODE -ne 0) {
            throw "MakeAppx bundle failed with exit code $LASTEXITCODE"
          }

      - name: Validate MSIX bundle output
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\artifacts\bundle" -Filter *.msixbundle -File -ErrorAction SilentlyContinue
          if (-not $files) {
            throw 'No MSIX bundle was produced.'
          }
          Write-Host "MSIX bundle produced: $($files | Select-Object -ExpandProperty Name)"

      - name: Upload MSIX bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-store-msix-bundle
          path: artifacts/bundle/*.msixbundle

  release:
    runs-on: ubuntu-latest
    needs:
      - publish
      - bundle
    environment: production

    steps:
      - name: Download x86 MSIX
        uses: actions/download-artifact@v4
        with:
          name: windows-store-msix-x86
          path: release-assets/msix/x86

      - name: Download x64 MSIX
        uses: actions/download-artifact@v4
        with:
          name: windows-store-msix-x64
          path: release-assets/msix/x64

      - name: Download arm64 MSIX
        uses: actions/download-artifact@v4
        with:
          name: windows-store-msix-arm64
          path: release-assets/msix/arm64

      - name: Download MSIX bundle
        uses: actions/download-artifact@v4
        with:
          name: windows-store-msix-bundle
          path: release-assets/bundle

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: store-msix-v${{ env.PRODUCT_VERSION }}
          name: Store MSIX v${{ env.PRODUCT_VERSION }}
          generate_release_notes: true
          files: |
            release-assets/msix/x86/*.msix
            release-assets/msix/x64/*.msix
            release-assets/msix/arm64/*.msix
            release-assets/bundle/*.msixbundle

