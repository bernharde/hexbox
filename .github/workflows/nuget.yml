name: nuget

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: Optional build workflow run ID. Leave empty to use latest successful run.
        required: false
        type: string
      artifact_name:
        description: Artifact name containing NuGet packages.
        required: false
        default: nuget-packages
        type: string

permissions:
  actions: read
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: windows-latest
    environment: production
    env:
      NUGET_USER: bernharde

    steps:
      - name: Resolve build run ID
        id: resolve_run
        uses: actions/github-script@v7
        with:
          script: |
            const provided = `${{ inputs.run_id }}`.trim();
            if (provided) {
              core.info(`Using provided run_id: ${provided}`);
              core.setOutput('run_id', provided);
              return;
            }

            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build.yml',
              status: 'completed',
              per_page: 50
            });

            const latestSuccessful = runs.find((r) => r.conclusion === 'success');
            if (!latestSuccessful) {
              core.setFailed('No successful build workflow runs found.');
              return;
            }

            core.info(`Auto-selected run_id: ${latestSuccessful.id}`);
            core.setOutput('run_id', String(latestSuccessful.id));

      - name: Download NuGet artifacts
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: artifacts/nuget
          run-id: ${{ steps.resolve_run.outputs.run_id }}
          repository: ${{ github.repository }}
          github-token: ${{ github.token }}

      - name: Publish packages to NuGet
        if: ${{ env.NUGET_USER != '' }}
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: ${{ env.NUGET_USER }}

      - name: Push packages to NuGet
        if: ${{ env.NUGET_USER != '' }}
        shell: bash
        run: |
          shopt -s nullglob
          packages=(artifacts/nuget/*.nupkg)
          if [ ${#packages[@]} -eq 0 ]; then
            echo "No .nupkg files found in artifacts/nuget." >&2
            exit 1
          fi

          dotnet nuget push artifacts/nuget/*.nupkg --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Fail when NuGet trusted user is missing
        if: ${{ env.NUGET_USER == '' }}
        shell: pwsh
        run: throw 'NUGET_USER is not configured for environment nuget.'
