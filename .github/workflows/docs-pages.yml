name: docs-pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Install DocFX
        run: dotnet tool update -g docfx

      - name: Build Be.Windows.Forms.HexBox for documentation
        run: dotnet build src/Be.Windows.Forms.HexBox/Be.Windows.Forms.HexBox.csproj --configuration Release --framework net10.0-windows /p:EnableWindowsTargeting=true /p:ContinuousIntegrationBuild=true

      - name: Build docs
        run: docfx docs/docfx.json

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_site

  deploy-docs:
    needs: build-docs
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Verify GitHub Pages is enabled
        uses: actions/github-script@v7
        with:
          script: |
            try {
              await github.request('GET /repos/{owner}/{repo}/pages', {
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
            } catch (error) {
              if (error.status === 404) {
                core.setFailed('GitHub Pages is not enabled for this repository. Enable Pages and set Source to GitHub Actions at https://github.com/bernharde/hexbox/settings/pages');
                return;
              }
              throw error;
            }

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
