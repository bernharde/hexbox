name: publish-nuget

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to publish from (for example v2.0.123).
        required: true
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish from (for example v2.0.123).
        required: true
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: windows-latest
    environment: nuget
    env:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - name: Download package from release assets
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p artifacts/nuget
          gh release download "${{ inputs.tag }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.nupkg" \
            --dir artifacts/nuget

      - name: Validate downloaded package files
        shell: bash
        run: |
          if ! ls artifacts/nuget/*.nupkg >/dev/null 2>&1; then
            echo "No .nupkg files found in release assets for tag '${{ inputs.tag }}'." >&2
            exit 1
          fi

      - name: Publish packages to NuGet
        if: ${{ env.NUGET_API_KEY != '' }}
        shell: bash
        run: |
          shopt -s nullglob
          packages=(artifacts/nuget/*.nupkg)
          if [ ${#packages[@]} -eq 0 ]; then
            echo "No .nupkg files found in artifacts/nuget." >&2
            exit 1
          fi

          dotnet nuget push artifacts/nuget/*.nupkg --api-key "${{ env.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Fail when NuGet key is missing
        if: ${{ env.NUGET_API_KEY == '' }}
        shell: pwsh
        run: throw 'NUGET_API_KEY is not configured for environment nuget.'
