name: store2

on:
  workflow_dispatch:

permissions:
  contents: write

env:
  PRODUCT_VERSION: 2.0.${{ github.run_number }}

jobs:
  publish:
    runs-on: windows-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86
            runtime: win-x86
            arch: x86
          - platform: x64
            runtime: win-x64
            arch: x64
          - platform: arm64
            runtime: win-arm64
            arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore app project
        run: dotnet restore src/Be.HexEditor/Be.HexEditor.csproj --runtime ${{ matrix.runtime }}

      - name: Publish app
        shell: pwsh
        run: |
          $PublishDir = Join-Path $env:GITHUB_WORKSPACE "artifacts\publish\${{ matrix.platform }}"
          dotnet publish src/Be.HexEditor/Be.HexEditor.csproj --configuration Release --runtime ${{ matrix.runtime }} --self-contained true /p:PublishSingleFile=true /p:EnableCompressionInSingleFile=true /p:PublishTrimmed=false /p:DebugType=none /p:DebugSymbols=false --output $PublishDir

      - name: Create MSIX package
        shell: pwsh
        run: |
          $WorkspaceDir    = $env:GITHUB_WORKSPACE
          $PublishDir      = Join-Path $WorkspaceDir "artifacts\publish\${{ matrix.platform }}"
          $StagingDir      = Join-Path $WorkspaceDir "artifacts\msix-staging\${{ matrix.platform }}"
          $OutputDir       = Join-Path $WorkspaceDir "artifacts\msix\${{ matrix.platform }}"
          $AssetsDir       = Join-Path $StagingDir "Assets"

          New-Item -ItemType Directory -Force -Path $StagingDir | Out-Null
          New-Item -ItemType Directory -Force -Path $OutputDir  | Out-Null
          New-Item -ItemType Directory -Force -Path $AssetsDir  | Out-Null

          # Copy published app files into staging root
          Copy-Item "$PublishDir\*" -Destination $StagingDir -Recurse -Force

          # Use PackageAssets from source tree if present, otherwise generate placeholders
          $SourceAssets = Join-Path $WorkspaceDir "src\Be.HexEditor\PackageAssets"
          if (Test-Path $SourceAssets) {
            Copy-Item "$SourceAssets\*" -Destination $AssetsDir -Recurse -Force
          } else {
            # Generate minimal 1x1 transparent PNG placeholders so MakeAppx succeeds.
            # Replace these with real artwork before submitting to the Store.
            Add-Type -AssemblyName System.Drawing
            $sizes = @{
              "Square44x44Logo.png"     = [System.Drawing.Size]::new(44, 44)
              "Square150x150Logo.png"   = [System.Drawing.Size]::new(150, 150)
              "Wide310x150Logo.png"     = [System.Drawing.Size]::new(310, 150)
              "Square71x71Logo.png"     = [System.Drawing.Size]::new(71, 71)
              "Square310x310Logo.png"   = [System.Drawing.Size]::new(310, 310)
              "StoreLogo.png"           = [System.Drawing.Size]::new(50, 50)
              "SplashScreen.png"        = [System.Drawing.Size]::new(620, 300)
            }
            foreach ($entry in $sizes.GetEnumerator()) {
              $bmp = New-Object System.Drawing.Bitmap($entry.Value.Width, $entry.Value.Height)
              $bmp.Save((Join-Path $AssetsDir $entry.Key), [System.Drawing.Imaging.ImageFormat]::Png)
              $bmp.Dispose()
            }
          }

          # Generate AppxManifest.xml
          # Publisher CN must match your Partner Center publisher display name.
          # Windows Store will replace the Identity block during ingestion when
          # the package is submitted unsigned via the Store upload flow.
          $manifest = @"
<?xml version="1.0" encoding="utf-8"?>
<Package
  xmlns="http://schemas.microsoft.com/appx/manifest/foundation/windows10"
  xmlns:uap="http://schemas.microsoft.com/appx/manifest/uap/windows10"
  xmlns:rescap="http://schemas.microsoft.com/appx/manifest/foundation/windows10/restrictedcapabilities"
  IgnorableNamespaces="uap rescap">

  <Identity
    Name="Be.HexEditor"
    Publisher="CN=Publisher"
    Version="${{ env.PRODUCT_VERSION }}.0"
    ProcessorArchitecture="${{ matrix.arch }}" />

  <Properties>
    <DisplayName>Be.HexEditor</DisplayName>
    <PublisherDisplayName>Be</PublisherDisplayName>
    <Logo>Assets\Square150x150Logo.png</Logo>
  </Properties>

  <Dependencies>
    <TargetDeviceFamily Name="Windows.Desktop" MinVersion="10.0.17763.0" MaxVersionTested="10.0.22621.0" />
  </Dependencies>

  <Resources>
    <Resource Language="en-us" />
  </Resources>

  <Applications>
    <Application Id="App" Executable="Be.HexEditor.exe" EntryPoint="Windows.FullTrustApplication">
      <uap:VisualElements
        DisplayName="Be.HexEditor"
        Square150x150Logo="Assets\Square150x150Logo.png"
        Square44x44Logo="Assets\Square44x44Logo.png"
        Description="View and edit files in hex format"
        BackgroundColor="transparent">
        <uap:DefaultTile
          Wide310x150Logo="Assets\Wide310x150Logo.png"
          Square71x71Logo="Assets\Square71x71Logo.png"
          Square310x310Logo="Assets\Square310x310Logo.png" />
        <uap:SplashScreen Image="Assets\SplashScreen.png" />
      </uap:VisualElements>
    </Application>
  </Applications>

  <Capabilities>
    <rescap:Capability Name="runFullTrust" />
  </Capabilities>

</Package>
"@
          Set-Content -Path (Join-Path $StagingDir "AppxManifest.xml") -Value $manifest -Encoding UTF8

          # Locate the latest MakeAppx.exe from the Windows SDK
          $makeAppx = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin" -Filter "makeappx.exe" -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.Directory.Name -eq "x64" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (-not $makeAppx) {
            throw "makeappx.exe not found. Ensure the Windows SDK is installed on the runner."
          }
          Write-Host "Using MakeAppx: $($makeAppx.FullName)"

          $OutputFile = Join-Path $OutputDir "Be.HexEditor-${{ matrix.platform }}.msix"
          & $makeAppx.FullName pack /d $StagingDir /p $OutputFile /nv
          if ($LASTEXITCODE -ne 0) {
            throw "MakeAppx failed with exit code $LASTEXITCODE"
          }

      - name: Validate MSIX output
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\artifacts\msix\${{ matrix.platform }}" -Filter *.msix -File -ErrorAction SilentlyContinue
          if (-not $files) {
            throw 'No MSIX package was produced.'
          }
          Write-Host "MSIX produced: $($files | Select-Object -ExpandProperty Name)"

      - name: Upload MSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-store-msix-${{ matrix.platform }}
          path: artifacts/msix/${{ matrix.platform }}/*.msix

  release:
    runs-on: ubuntu-latest
    needs: publish
    environment: production

    steps:
      - name: Download x86 MSIX
        uses: actions/download-artifact@v4
        with:
          name: windows-store-msix-x86
          path: release-assets/msix/x86

      - name: Download x64 MSIX
        uses: actions/download-artifact@v4
        with:
          name: windows-store-msix-x64
          path: release-assets/msix/x64

      - name: Download arm64 MSIX
        uses: actions/download-artifact@v4
        with:
          name: windows-store-msix-arm64
          path: release-assets/msix/arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: store2-v${{ env.PRODUCT_VERSION }}
          name: Store MSIX v${{ env.PRODUCT_VERSION }}
          generate_release_notes: true
          files: |
            release-assets/msix/x86/*.msix
            release-assets/msix/x64/*.msix
            release-assets/msix/arm64/*.msix
