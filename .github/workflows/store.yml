name: store

on:
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  PRODUCT_VERSION: 2.0.${{ github.run_number }}
  BLOB_PREFIX: store-v${{ github.run_number }}

jobs:
  publish:
    runs-on: windows-latest
    environment: production
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: x86
            runtime: win-x86
          - platform: x64
            runtime: win-x64
          - platform: arm64
            runtime: win-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore app project
        run: dotnet restore src/Be.HexEditor/Be.HexEditor.csproj --runtime ${{ matrix.runtime }}

      - name: Publish app
        shell: pwsh
        run: |
          $WorkspaceDir = $env:GITHUB_WORKSPACE
          $PublishDir = Join-Path $WorkspaceDir "artifacts\publish\${{ matrix.platform }}"
          dotnet publish src/Be.HexEditor/Be.HexEditor.csproj --configuration Release --runtime ${{ matrix.runtime }} --self-contained true /p:PublishSingleFile=true /p:EnableCompressionInSingleFile=true /p:PublishTrimmed=false /p:DebugType=none /p:DebugSymbols=false --output $PublishDir

      - name: Generate installer file list
        shell: pwsh
        run: |
          $WorkspaceDir = $env:GITHUB_WORKSPACE
          $PublishDir = Join-Path $WorkspaceDir "artifacts\publish\${{ matrix.platform }}"
          $GeneratedWxsPath = Join-Path $WorkspaceDir "artifacts\wix\${{ matrix.platform }}\GeneratedFiles.wxs"
          pwsh -File src/Be.HexEditor.Installer/GenerateInstallerFiles.ps1 -PublishDir $PublishDir -OutputPath $GeneratedWxsPath

      - name: Build MSI installer
        shell: pwsh
        run: |
          $WorkspaceDir = $env:GITHUB_WORKSPACE
          $PublishDir = Join-Path $WorkspaceDir "artifacts\publish\${{ matrix.platform }}"
          $GeneratedWxsPath = Join-Path $WorkspaceDir "artifacts\wix\${{ matrix.platform }}\GeneratedFiles.wxs"
          $OutputDir = Join-Path $WorkspaceDir "artifacts\msi\${{ matrix.platform }}"
          dotnet build src/Be.HexEditor.Installer/Be.HexEditor.Installer.wixproj --configuration Release -p:InstallerPlatform=${{ matrix.platform }} -p:ProductVersion=$env:PRODUCT_VERSION -p:PublishDir=$PublishDir -p:GeneratedWxsPath=$GeneratedWxsPath -p:OutputPath=$OutputDir

      - name: Validate MSI output
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\artifacts\msi\${{ matrix.platform }}" -Filter *.msi -File -ErrorAction SilentlyContinue
          if (-not $files) {
            throw 'No MSI installer was produced.'
          }

      - name: Upload Store artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-store-installer-${{ matrix.platform }}
          path: artifacts/msi/${{ matrix.platform }}/*.msi

  release:
    runs-on: ubuntu-latest
    needs: publish
    environment: production

    steps:
      - name: Download x86 MSI
        uses: actions/download-artifact@v4
        with:
          name: windows-store-installer-x86
          path: release-assets/msi/x86

      - name: Download x64 MSI
        uses: actions/download-artifact@v4
        with:
          name: windows-store-installer-x64
          path: release-assets/msi/x64

      - name: Download arm64 MSI
        uses: actions/download-artifact@v4
        with:
          name: windows-store-installer-arm64
          path: release-assets/msi/arm64

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: store-v${{ env.PRODUCT_VERSION }}
          name: Store installers v${{ env.PRODUCT_VERSION }}
          generate_release_notes: true
          files: |
            release-assets/msi/x86/*.msi
            release-assets/msi/x64/*.msi
            release-assets/msi/arm64/*.msi

  blob:
    runs-on: windows-latest
    needs: publish
    environment: production

    steps:
      - name: Download x86 MSI
        uses: actions/download-artifact@v4
        with:
          name: windows-store-installer-x86
          path: blob-assets/x86

      - name: Download x64 MSI
        uses: actions/download-artifact@v4
        with:
          name: windows-store-installer-x64
          path: blob-assets/x64

      - name: Download arm64 MSI
        uses: actions/download-artifact@v4
        with:
          name: windows-store-installer-arm64
          path: blob-assets/arm64

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload MSI files to Blob Storage
        shell: pwsh
        env:
          AZURE_STORAGE_ACCOUNT: ${{ vars.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_CONTAINER: ${{ vars.AZURE_STORAGE_CONTAINER }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:AZURE_STORAGE_ACCOUNT)) {
            throw 'Repository variable AZURE_STORAGE_ACCOUNT is required.'
          }

          if ([string]::IsNullOrWhiteSpace($env:AZURE_STORAGE_CONTAINER)) {
            throw 'Repository variable AZURE_STORAGE_CONTAINER is required.'
          }

          $files = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\blob-assets" -Filter *.msi -File -Recurse
          if (-not $files) {
            throw 'No MSI files were downloaded for Blob upload.'
          }

          foreach ($file in $files) {
            $blobName = "$env:BLOB_PREFIX/$($file.Name)"
            az storage blob upload --account-name $env:AZURE_STORAGE_ACCOUNT --container-name $env:AZURE_STORAGE_CONTAINER --name $blobName --file $file.FullName --overwrite true --auth-mode login --content-type application/x-msi | Out-Null
          }

      - name: Print direct download URLs
        shell: pwsh
        env:
          AZURE_STORAGE_ACCOUNT: ${{ vars.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_CONTAINER: ${{ vars.AZURE_STORAGE_CONTAINER }}
        run: |
          $files = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\blob-assets" -Filter *.msi -File -Recurse | Sort-Object Name
          $summaryLines = @(
            "## Azure Blob MSI URLs",
            ""
          )

          foreach ($file in $files) {
            $url = "https://$($env:AZURE_STORAGE_ACCOUNT).blob.core.windows.net/$($env:AZURE_STORAGE_CONTAINER)/$env:BLOB_PREFIX/$($file.Name)"
            $summaryLines += "- $($file.Name): $url"
          }

          Add-Content -Path $env:GITHUB_STEP_SUMMARY -Value ($summaryLines -join [Environment]::NewLine)
