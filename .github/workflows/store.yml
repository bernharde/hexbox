name: store

on:
  workflow_dispatch:
    inputs:
      package_project:
        description: Path to Windows packaging project (.wapproj).
        required: true
        default: src/Be.HexEditor.Package/Be.HexEditor.Package.wapproj
        type: string

permissions:
  contents: read

jobs:
  publish:
    runs-on: windows-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore solution
        run: dotnet restore src/hexbox.sln

      - name: Build Store upload package
        shell: pwsh
        run: |
          msbuild "${{ inputs.package_project }}" /restore /p:Configuration=Release /p:UapAppxPackageBuildMode=StoreUpload /p:AppxBundle=Always /p:AppxPackageDir=$env:GITHUB_WORKSPACE\artifacts\store\

      - name: Validate Store package output
        shell: pwsh
        run: |
          $files = Get-ChildItem -Path "$env:GITHUB_WORKSPACE\artifacts\store" -Recurse -File -ErrorAction SilentlyContinue
          $uploads = $files | Where-Object { $_.Name -match '\.(msixupload|appxupload)$' }
          if (-not $uploads) {
            throw 'No .msixupload or .appxupload files were produced. Ensure package_project points to a valid .wapproj configured for Store upload.'
          }

      - name: Upload Store artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-store-artifacts
          path: artifacts/store/**
