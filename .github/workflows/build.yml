name: build

on:
  push:
    branches:
      - main
      - master
      - feature/**
  pull_request:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore src/hexbox.sln

      - name: Build
        run: dotnet build src/hexbox.sln --configuration Release --no-restore /p:ContinuousIntegrationBuild=true

      - name: Pack Be.Windows.Forms.HexBox
        run: dotnet pack src/Be.Windows.Forms.HexBox/Be.Windows.Forms.HexBox.csproj --configuration Release --no-build --output artifacts/nuget /p:ContinuousIntegrationBuild=true /p:PackageVersion=2.0.${{ github.run_number }}

      - name: Publish Be.HexEditor small self-contained artifact
        run: dotnet publish src/Be.HexEditor/Be.HexEditor.csproj -p:PublishProfile=SmallSelfContained --output artifacts/publish/Be.HexEditor/SmallSelfContained

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/nuget/*

      - name: Upload Be.HexEditor artifact
        uses: actions/upload-artifact@v4
        with:
          name: be-hexeditor-fast-start
          path: artifacts/publish/Be.HexEditor/SmallSelfContained/**

  tag-release:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Create and push tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "v2.0.${{ github.run_number }}"
          git push origin "v2.0.${{ github.run_number }}"

      - name: Download NuGet artifacts
        uses: actions/download-artifact@v4
        with:
          name: nuget-packages
          path: release-assets/nuget

      - name: Download Be.HexEditor artifact
        uses: actions/download-artifact@v4
        with:
          name: be-hexeditor-fast-start
          path: release-assets/Be.HexEditor

      - name: Zip Be.HexEditor binaries
        run: zip -r release-assets/Be.HexEditor-v2.0.${{ github.run_number }}.zip release-assets/Be.HexEditor/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.${{ github.run_number }}
          name: Release v2.0.${{ github.run_number }}
          generate_release_notes: true
          files: |
            release-assets/nuget/*.nupkg
            release-assets/nuget/*.snupkg
            release-assets/Be.HexEditor-v2.0.${{ github.run_number }}.zip

      - name: Trigger NuGet publish workflow
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'nuget-publish.yml',
              ref: '${{ github.ref_name }}',
              inputs: {
                tag: 'v2.0.${{ github.run_number }}'
              }
            });
